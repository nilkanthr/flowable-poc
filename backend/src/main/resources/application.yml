server:
  port: 8080

spring:
  application:
    name: rakbank-onboarding-poc
  datasource:
    url: jdbc:h2:mem:flowabledb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

flowable:
  async-executor-activate: true
  database-schema-update: true
  history-level: full
  # Auto-deploy processes from resources/processes/
  check-process-definitions: true

# Demo configuration — controls stub behavior
demo:
  # Simulated delay in ms for external service calls
  uae-pass-delay-ms: 1200
  fircosoft-delay-ms: 2500
  aecb-delay-ms: 2200
  threat-matrix-delay-ms: 1800
  risk-delay-ms: 800
  efr-delay-ms: 1500
  account-creation-delay-ms: 1000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.rakbank: DEBUG
    org.flowable: INFO
